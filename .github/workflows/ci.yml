name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build Portal
        run: npm run build

      - name: Check Anchor Contracts
        run: npm run check:anchor

      - name: Run Design Anchor Audit
        run: npm run anchor:audit:all

      - name: Verify npm Package
        run: npm pack --dry-run
